<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>180日の習慣設計 | Teras Lab.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- PWA Settings -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Teras Lab.">
<meta name="theme-color" content="#FAFAF7">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">

<style>
  :root {
    --bg:        #FAFAF7;
    --bg-soft:   #F2F0EA;
    --sage:      #B5C4A8;
    --sage-deep: #7A8A6E;
    --sage-pale: #E8EDE3;
    --ink:       #1F1F1C;
    --ink-soft:  #4A4A45;
    --gray:      #8A8A82;
    --line:      #D9D6CD;
    --line-faint:#ECEAE3;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: 0.02em;
  }
  .serif { font-family: 'Shippori Mincho', serif; font-weight: 500; }
  .display { font-family: 'Cormorant Garamond', serif; font-weight: 300; letter-spacing: 0.02em; }

  .container { max-width: 880px; margin: 0 auto; padding: 0 24px; }
  @media (max-width:640px){ .container { padding: 0 20px; } }

  /* ヘッダー */
  header.top {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--line-faint);
  }
  .brand {
    display: flex; align-items: baseline; gap: 12px;
    justify-content: center;
  }
  .brand-mark {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--sage);
    border-radius: 50%;
    transform: translateY(-2px);
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .brand-sub {
    text-align: center;
    margin-top: 4px;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px; letter-spacing: 0.3em;
    color: var(--gray);
  }

  /* イントロ */
  .intro {
    padding: 64px 0 48px;
    text-align: center;
  }
  .intro-greeting {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    margin-bottom: 28px;
  }
  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(32px, 5vw, 48px);
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .intro-title-jp {
    font-family: 'Shippori Mincho', serif;
    font-weight: 500;
    font-size: clamp(30px, 5vw, 44px);
    line-height: 1.4;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .intro-tagline {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: var(--sage-deep);
    letter-spacing: 0.15em;
    margin-top: 20px;
  }
  .intro-line {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 32px;
    line-height: 2;
  }
  .divider-dot {
    margin: 48px auto;
    text-align: center;
    color: var(--sage);
    font-size: 18px;
    letter-spacing: 1em;
  }

  /* 章セクション */
  .chapter-section { margin: 56px 0 32px; }
  .chapter-section h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 32px;
  }
  .chapter-section h2::before {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: var(--sage);
    vertical-align: middle;
    margin-right: 16px;
    transform: translateY(-2px);
  }
  .chapter-section h2::after {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: var(--sage);
    vertical-align: middle;
    margin-left: 16px;
    transform: translateY(-2px);
  }
  .chapter-meta {
    text-align: center;
    color: var(--gray);
    font-size: 12px;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }

  /* DAY グリッド */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  @media (max-width:640px){
    .day-grid { grid-template-columns: repeat(7, 1fr); gap: 6px; }
  }
  .day-cell {
    aspect-ratio: 1;
    border: 1px solid var(--line-faint);
    background: #fff;
    display: flex;
    align-items: center; justify-content: center;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--ink-soft);
    position: relative;
    transition: all 0.2s ease;
    user-select: none;
  }
  .day-cell:hover {
    border-color: var(--sage-deep);
    background: var(--sage-pale);
    color: var(--sage-deep);
  }
  .day-cell.milestone {
    background: var(--sage-pale);
    border-color: var(--sage);
    color: var(--sage-deep);
    font-weight: 500;
  }
  .day-cell.milestone::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 4px; height: 4px;
    background: var(--sage-deep);
    border-radius: 50%;
  }
  .day-cell .num {
    font-size: 14px;
    line-height: 1;
  }
  @media (max-width:640px){
    .day-cell .num { font-size: 12px; }
  }

  /* DAYビュー */
  .day-view {
    position: fixed;
    inset: 0;
    background: var(--bg);
    overflow-y: auto;
    z-index: 100;
    display: none;
  }
  .day-view.show {
    display: block;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-view-header {
    padding: 20px 0;
    border-bottom: 1px solid var(--line-faint);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .day-view-header .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .back-btn {
    background: none;
    border: none;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 8px 0;
    letter-spacing: 0.1em;
  }
  .back-btn:hover { color: var(--sage-deep); }
  .day-view-header .progress {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--gray);
    letter-spacing: 0.1em;
  }

  .day-view-body { padding: 48px 0 80px; }
  .day-meta {
    text-align: center;
    margin-bottom: 32px;
  }
  .day-chapter {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--sage-deep);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }
  .day-number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(64px, 14vw, 120px);
    line-height: 1;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .day-week-info {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }
  .day-week-info span {
    margin: 0 12px;
  }
  .day-week-info .sep {
    color: var(--line);
    margin: 0 8px;
  }
  .day-concept {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    color: var(--sage-deep);
    margin: 24px 0 12px;
  }
  .day-greeting {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 2;
    max-width: 480px;
    margin: 0 auto;
  }
  .day-milestone {
    margin-top: 24px;
    padding: 16px 24px;
    background: var(--sage-pale);
    border-radius: 2px;
    display: inline-block;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--sage-deep);
    letter-spacing: 0.1em;
  }

  .video-section {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--line-faint);
  }
  .video-section + .video-section { margin-top: 48px; }
  .video-label {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .video-label-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--gray);
  }
  .video-label-line { flex: 1; height: 1px; background: var(--line-faint); }
  .video-label-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--sage-deep);
    font-style: italic;
  }
  .video-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .video-meta {
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }
  .video-meta .pill {
    display: inline-block;
    padding: 2px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    margin-right: 6px;
  }
  .video-frame {
    position: relative;
    aspect-ratio: 9 / 16;
    max-width: 360px;
    margin: 0 auto;
    background: #000;
    border-radius: 2px;
    overflow: hidden;
  }
  .video-frame iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .day-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--line-faint);
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--line);
    padding: 12px 28px;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 2px;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--sage-deep);
    color: var(--sage-deep);
    background: var(--sage-pale);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  footer {
    text-align: center;
    padding: 64px 0 48px;
    color: var(--gray);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
  }
  footer .dot { color: var(--sage); margin: 0 12px; }

  .fade-in {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>

function splitChapter(s) {
  const m = s.match(/^([^\u3040-\u30FF\u4E00-\u9FFF]+)(.*)$/);

}

  'ひらく': 'ひらける時期',
  'なじむ': '日常に溶け込む',
  'ととのう': '180日を仕上げる',
};

// 曜日コンセプト × 主語「僕」のメッセージ
const CONCEPT_MSG = {
  '始まりの日':   '今週もはじめよう。軽く流すくらいでちょうどいい。',
  '集中の日':     '今日はちょっと集中。10分でいいから、ぐっと向き合おう。',
  '山場の日':     '今日は踏ん張りどころ。一緒に行こう。',
  '静かな日':     'ゆっくり整える日。深呼吸しながらでOK。',
  'もう一山':     '今週もう一押し。ここを越えたら週末だ。',
  'じっくりの日': '時間をかけて、ていねいに。焦らなくていい。',
  '整える日':     '今週おつかれさま。リセットして次にいこう。',
};

function renderChapters() {
  const container = document.getElementById('chaptersContainer');
  container.innerHTML = '';
  
  chapters.forEach((ch, idx) => {
    const split = splitChapter(ch.name);
    const cleanName = split.name.replace('期', '');
    const desc = CHAPTER_DESC[cleanName] || '';
    const firstDay = ch.days[0].day;
    const lastDay  = ch.days[ch.days.length - 1].day;
    
    const section = document.createElement('section');
    section.className = 'chapter-section fade-in';
    section.style.animationDelay = (idx * 0.08) + 's';
    section.innerHTML = `
      <h2><span style="font-style:normal;">${split.icon}</span>${split.name}</h2>
      <div class="chapter-meta">DAY ${firstDay} — DAY ${lastDay}　／　${desc}</div>
      <div class="day-grid">
        ${ch.days.map(d => `
          <div class="day-cell ${d.milestone ? 'milestone' : ''}" data-day="${d.day}" onclick="openDayView(${d.day})">
            <span class="num">${d.day}</span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(section);
  });
}

function toVimeoEmbed(url) {
  if (!url) return '';
  const m = url.match(/vimeo\.com\/(\d+)(?:\/([a-z0-9]+))?/);
  if (!m) return url;
  const id = m[1];
  const hash = m[2];
  return `https://player.vimeo.com/video/${id}${hash ? '?h=' + hash : ''}`;
}

function openDayView(dayNum) {
  const d = PROGRAM_DATA.find(x => x.day === dayNum);
  if (!d) return;
  
  document.getElementById('dayProgress').textContent = `${d.day} / 180`;
  
  // 曜日コンセプトに応じた一言
  const conceptMsg = CONCEPT_MSG[d.concept] || 'よく来た。今日もいっしょにやろう。';
  
  const body = document.getElementById('dayViewBody');
  body.innerHTML = `
    <div class="day-meta fade-in">
      <div class="day-chapter">${d.chapter}</div>
      <div class="day-number">${d.day}</div>
      <div class="day-week-info">
        <span>${d.week}</span><span class="sep">／</span><span>${d.weekday}曜日</span>
      </div>
      <div class="day-concept">「${d.concept}」</div>
      <p class="day-greeting">
        お疲れさま、よく来た。<br>
        ${conceptMsg}<br>
        ${d.weekMemo ? d.weekMemo + '。' : ''}
      </p>
      ${d.milestone ? `<div class="day-milestone">${d.milestone}</div>` : ''}
    </div>
    
    ${d.main ? `
      <section class="video-section">
        <div class="video-label">
          <span class="video-label-num">i.</span>
          <span class="video-label-line"></span>
          <span class="video-label-text">MAIN</span>
        </div>
        <h3 class="video-title">${d.main.title || 'メインの一本'}</h3>
        <div class="video-meta">
          <span class="pill">${d.main.part}</span>
          <span class="pill">${d.main.level}</span>
          <span style="margin-left:8px;">${d.main.sec}秒</span>
        </div>
        <div class="video-frame">
          <iframe src="${toVimeoEmbed(d.main.link)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
      </section>
    ` : ''}
    
    ${d.sub ? `
      <section class="video-section">
        <div class="video-label">
          <span class="video-label-num">ii.</span>
          <span class="video-label-line"></span>
          <span class="video-label-text">SUB</span>
        </div>
        <h3 class="video-title">${d.sub.title || 'サブの一本'}</h3>
        <div class="video-meta">
          <span class="pill">${d.sub.part}</span>
          <span class="pill">${d.sub.level}</span>
          <span style="margin-left:8px;">${d.sub.sec}秒</span>
        </div>
        <div class="video-frame">
          <iframe src="${toVimeoEmbed(d.sub.link)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
      </section>
    ` : ''}
    
    <nav class="day-nav">
      <button class="nav-btn" onclick="openDayView(${d.day - 1})" ${d.day <= 1 ? 'disabled' : ''}>← 前の日</button>
      <button class="nav-btn" onclick="openDayView(${d.day + 1})" ${d.day >= 180 ? 'disabled' : ''}>次の日 →</button>
    </nav>
  `;
  
  document.getElementById('topView').style.display = 'none';
  const view = document.getElementById('dayView');
  view.classList.add('show');
  window.scrollTo(0, 0);
  
  history.replaceState(null, '', '#day' + d.day);
}

function closeDayView() {
  document.getElementById('dayView').classList.remove('show');
  document.getElementById('topView').style.display = 'block';
  history.replaceState(null, '', '#');
}

function handleHash() {
  const m = location.hash.match(/^#day(\d+)$/);
  if (m) {
    const dayNum = parseInt(m[1], 10);
    if (dayNum >= 1 && dayNum <= 180) {
      openDayView(dayNum);
      return;
    }
  }
  closeDayView();
}

window.addEventListener('hashchange', handleHash);
renderChapters();
handleHash();
</script>

</body>
</html>
